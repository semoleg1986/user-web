name: release
on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/semoleg1986/${{ github.event.repository.name }}:latest
            ghcr.io/semoleg1986/${{ github.event.repository.name }}:${{ github.sha }}
            ghcr.io/semoleg1986/${{ github.event.repository.name }}:${{ github.ref_name }}
