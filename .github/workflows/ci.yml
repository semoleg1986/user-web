name: ci

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Checkout provider specs (auth-service)
        uses: actions/checkout@v5
        with:
          repository: semoleg1986/auth-service
          path: deps/auth-service

      - name: Checkout provider specs (user-children-service)
        uses: actions/checkout@v5
        with:
          repository: semoleg1986/user-children-service
          path: deps/user-children-service

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Contract checks
        run: pnpm run test:contract
        env:
          CONTRACT_SPECS_BASE_DIR: ${{ github.workspace }}/deps
